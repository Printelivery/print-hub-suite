<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery - Layout Tools Workspace</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            
            /* HORIZONTAL POSITIONING: Pushes the container to the right side */
            justify-content: flex-end; 
            
            /* VERTICAL POSITIONING: Aligns container to the top area */
            align-items: flex-start; 
            
            /* VERTICAL TUNING: Higher number pushes it down into the red box zone */
            padding-top: 100px;        
            
            min-height: 100vh;
            box-sizing: border-box;
            background: url('https://i.postimg.cc/tTGqQNBq/vecteezy-hand-holding-a-freshly-printed-photograph-with-vibrant-31548911.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        
        /* --- THE ALIGNED LAYOUT WRAPPER CONTROLLER --- */
        .panel-container {
            width: 100%;
            max-width: 540px; /* Controls card grid width */ 
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* HORIZONTAL TUNING: Pulls the cards slightly away from the absolute right edge */
            margin-right: 25%; 
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 4px 0;
            color: #1e1b4b;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-align: center;
            text-shadow: 0 2px 12px #ffffff, 0 4px 24px #ffffff, 0 0 4px #ffffff;
        }

        p.subtitle {
            color: #1e293b;
            font-size: 1.1rem;
            margin: 0 0 40px 0;
            text-align: center;
            font-weight: 600;
            text-shadow: 0 2px 10px #ffffff, 0 0 4px #ffffff;
            max-width: 500px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 580px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(10px) saturate(140%);
            -webkit-backdrop-filter: blur(10px) saturate(140%);
            position: relative;
            overflow: hidden;
            padding: 24px 20px;
            border-radius: 18px;
            box-shadow: 
                0 10px 25px rgba(15, 23, 42, 0.12),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-decoration: none;
            color: #0f172a;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        background 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ec4899, #eab308);
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 16px 35px rgba(15, 23, 42, 0.2);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .card h2 {
            margin: 0 0 8px 0;
            font-size: 1.15rem;
            color: #0f172a;
            font-weight: 700;
        }

        .card p {
            font-size: 0.85rem;
            color: #475569;
            margin: 0;
            line-height: 1.5;
            font-weight: 500;
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            body {
                justify-content: center;
                padding: 40px 20px;
            }
            .panel-container {
                margin-right: 0;
                max-width: 500px;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="panel-container">
        
        <h1>Layout Utilities</h1>
        <p class="subtitle">Select a configuration engine below to adapt your image frames</p>

        <div class="grid">
            
            <a href="tools/circular-layout/index.html" class="card">
                <div class="icon">⭕</div>
                <h2>Circular Layout</h2>
                <p>Generate radial photo framing geometries paired with custom background blurs.</p>
            </a>
            
            <a href="tools/rectangle-layout/index.html" class="card">
                <div class="icon">📏</div>
                <h2>Rectangle Layout</h2>
                <p>Optimize multi-grid image placement on industrial standard print dimensions.</p>
            </a>

        </div>
        
    </div>

</body>
</html>
