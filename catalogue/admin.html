<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery - Admin Portal</title>
    <style>
        :root {
            --primary-color: #075E54;
            --accent-color: #25D366;
            --bg-color: #f4f6f8;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
        }
        .admin-container {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid #e2e8f0;
        }
        h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.75rem;
        }
        p.subtitle {
            color: #718096;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        .id-hint {
            font-size: 0.8rem;
            color: #2b6cb0;
            font-weight: 500;
            margin-top: 4px;
            display: block;
        }
        input[type="text"], textarea, input[type="password"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: #fff;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        textarea {
            resize: vertical;
            height: 100px;
            font-family: inherit;
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #05463e;
        }
        .btn-submit:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            font-weight: 500;
            text-align: center;
        }
        .success {
            background-color: #def7ec;
            color: #03543f;
            border: 1px solid #bcf0da;
        }
        .error {
            background-color: #fde8e8;
            color: #9b1c1c;
            border: 1px solid #fbd5d5;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Product Management Portal</h2>
    <p class="subtitle">Add a new item or provide an existing Product ID to overwrite row data.</p>
    
    <form id="productForm">
        <div class="form-group">
            <label for="productGroupSelect">Product Group / Category</label>
            <select id="productGroupSelect" onchange="toggleCustomGroupField()" required>
                <option value="" disabled selected>Loading existing categories...</option>
            </select>
            
            <input type="text" id="customGroupInput" placeholder="Type new category name here..." style="display: none; margin-top: 10px;" />
        </div>

        <div class="form-group">
            <label for="productId">Product ID (Matches Image File Name)</label>
            <input type="text" id="productId" placeholder="e.g., PRNTLRY_28" required>
            <span class="id-hint" id="idTrackerHint">Fetching highest ID usage...</span>
        </div>
        
        <div class="form-group">
            <label for="productName">Product Name / Title</label>
            <input type="text" id="productName" placeholder="e.g., A4 Plain Paper Printing" required>
        </div>
        
        <div class="form-group">
            <label for="description">Product Description</label>
            <textarea id="description" placeholder="Enter specifications, paper quality, options..." required></textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Display Price</label>
            <input type="text" id="price" placeholder="e.g., ₹5 or ₹10 per page" required>
        </div>

        <div class="form-group" style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <label for="password">Admin Security Password</label>
            <input type="password" id="password" placeholder="Enter your script password" required>
        </div>
        
        <button type="submit" class="btn-submit" id="submitBtn">Save Product Changes</button>
    </form>

    <div id="message"></div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZuJdNU_JDKhM9OSgx4yPa9rWGtL7PJ9dgbaoaWNJ4_0jZ-AUOKLEUiCCACjiHlOYwsvwNG1ftwCMG/pub?gid=0&single=true&output=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybBHuz8qzyyrt5uZGwnMouIrY5Zbm1Hknab-pKBbAQyx5iExTMfiZDQuWPZZXntaEp/exec";

    // Simple CSV parser logic to scan rows
    function parseCSV(text) {
        let p = '', r = []; let q = false; let row = [''];
        for (let i=0; i<text.length; i++) {
            let c = text[i]; let next = text[i+1];
            if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
            else if (c === ',' && !q) { row.push(''); }
            else if ((c === '\r' || c === '\n') && !q) {
                if (c === '\r' && next === '\n') { i++; }
                r.push(row); row = [''];
            } else { row[row.length-1] += c; }
        }
        if (row.length > 1 || row[0] !== '') { r.push(row); }
        return r;
    }

    // Load setup configurations directly from your sheet live data stream on page startup
    async function loadFormDynamics() {
        try {
            const response = await fetch(CSV_URL);
            const dataText = await response.text();
            const parsedRows = parseCSV(dataText);
            parsedRows.shift(); // Drop headers row

            const groups = new Set();
            let maxNumId = 0;

            parsedRows.forEach(row => {
                const groupName = row[0]?.trim();
                const idName = row[1]?.trim();

                if (groupName) groups.add(groupName);
                
                // Track highest sequential ID number match (PRNTLRY_XX)
                if (idName && idName.includes('_')) {
                    const extractedNum = parseInt(idName.split('_')[1]);
                    if (!isNaN(extractedNum) && extractedNum > maxNumId) {
                        maxNumId = extractedNum;
                    }
                }
            });

            // Rebuild selection dropdown component structure
            const selectEl = document.getElementById('productGroupSelect');
            selectEl.innerHTML = '<option value="" disabled selected>Select a Product Group</option>';
            
            groups.forEach(g => {
                selectEl.innerHTML += `<option value="${g}">${g}</option>`;
            });
            selectEl.innerHTML += `<option value="NEW_GROUP_OPTION">[ Add New Group... ]</option>`;

            // Update ID placeholder indicator text live data hints
            const hintEl = document.getElementById('idTrackerHint');
            if(maxNumId > 0) {
                hintEl.innerText = `Last ID Used: PRNTLRY_${maxNumId} (Next suggested sequence item: PRNTLRY_${maxNumId + 1})`;
                document.getElementById('productId').placeholder = `e.g., PRNTLRY_${maxNumId + 1}`;
            } else {
                hintEl.innerText = "No IDs discovered yet. Starting base sequence formatting recommendation: PRNTLRY_01";
            }

        } catch (error) {
            console.error("Initialization sync layer issue:", error);
            document.getElementById('idTrackerHint').innerText = "Failed to synchronize highest identifier indices.";
        }
    }

    function toggleCustomGroupField() {
        const selectEl = document.getElementById('productGroupSelect');
        const customField = document.getElementById('customGroupInput');
        if (selectEl.value === "NEW_GROUP_OPTION") {
            customField.style.display = "block";
            customField.required = true;
        } else {
            customField.style.display = "none";
            customField.required = false;
            customField.value = "";
        }
    }

    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Processing update...";
        messageDiv.style.display = "none";

        // Determine group value based on selection variant choice
        const selectValue = document.getElementById('productGroupSelect').value;
        const selectedGroup = selectValue === "NEW_GROUP_OPTION" 
            ? document.getElementById('customGroupInput').value.trim() 
            : selectValue;
        
        const payload = {
            productGroup: selectedGroup,
            productId: document.getElementById('productId').value.trim(),
            productName: document.getElementById('productName').value.trim(),
            description: document.getElementById('description').value.trim(),
            price: document.getElementById('price').value.trim(),
            password: document.getElementById('password').value
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            messageDiv.className = "success";
            messageDiv.innerText = "Request dispatched successfully! Refreshing dynamic dataset fields...";
            messageDiv.style.display = "block";
            
            // Clean inputs out
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('description').value = '';
            document.getElementById('price').value = '';
            document.getElementById('customGroupInput').value = '';
            
            // Refresh dynamic options arrays on completion loop automatically
            await loadFormDynamics();

        } catch (error) {
            console.error("Transmission error:", error);
            messageDiv.className = "error";
            messageDiv.innerText = "System error sending updates: " + error.toString();
            messageDiv.style.display = "block";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Save Product Changes";
        }
    });

    // Run setup query operations on system load
    loadFormDynamics();
</script>

</body>
</html>
