<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery - Admin Portal</title>
    <style>
        :root {
            --primary-color: #075E54;
            --accent-color: #25D366;
            --bg-color: #f4f6f8;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
        }
        .admin-container {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid #e2e8f0;
        }
        h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.75rem;
        }
        p.subtitle {
            color: #718096;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        input[type="text"], textarea, input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        textarea {
            resize: vertical;
            height: 100px;
            font-family: inherit;
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #05463e;
        }
        .btn-submit:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
        #message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            font-weight: 500;
            text-align: center;
        }
        .success {
            background-color: #def7ec;
            color: #03543f;
            border: 1px solid #bcf0da;
        }
        .error {
            background-color: #fde8e8;
            color: #9b1c1c;
            border: 1px solid #fbd5d5;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Product Management Portal</h2>
    <p class="subtitle">Add a new item or type an existing product ID to overwrite details.</p>
    
    <form id="productForm">
        <div class="form-group">
            <label for="code">Product Code / ID (Matches Image Name)</label>
            <input type="text" id="code" placeholder="e.g., PRNTLRY_01" required>
        </div>
        
        <div class="form-group">
            <label for="title">Product Title</label>
            <input type="text" id="title" placeholder="e.g., A4 Plain Paper Printing" required>
        </div>
        
        <div class="form-group">
            <label for="desc">Product Description</label>
            <textarea id="desc" placeholder="Enter specifications, paper quality, options..." required></textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Display Price</label>
            <input type="text" id="price" placeholder="e.g., ₹5 or ₹10 per page" required>
        </div>

        <div class="form-group" style="margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px;">
            <label for="password">Admin Security Password</label>
            <input type="password" id="password" placeholder="Enter your script password" required>
        </div>
        
        <button type="submit" class="btn-submit" id="submitBtn">Save Product Changes</button>
    </form>

    <div id="message"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybBHuz8qzyyrt5uZGwnMouIrY5Zbm1Hknab-pKBbAQyx5iExTMfiZDQuWPZZXntaEp/exec";

    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        // UI feedback during process
        submitBtn.disabled = true;
        submitBtn.innerText = "Processing update...";
        messageDiv.style.display = "none";
        
        const payload = {
            code: document.getElementById('code').value.trim(),
            title: document.getElementById('title').value.trim(),
            desc: document.getElementById('desc').value.trim(),
            price: document.getElementById('price').value.trim(),
            password: document.getElementById('password').value
        };

        try {
            // Send payload to Google Web App using a standard fetch call
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Required for Google Script cross-domain execution redirects
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            // Note: 'no-cors' requests return an opaque response structure where status cannot be read directly via JS,
            // but the execution will process successfully in the sheet background.
            messageDiv.className = "success";
            messageDiv.innerText = "Request dispatched successfully! Check your Google Sheet to verify changes.";
            messageDiv.style.display = "block";
            
            // Clear inputs except password for workflow efficiency
            document.getElementById('code').value = '';
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('price').value = '';

        } catch (error) {
            console.error("Transmission error:", error);
            messageDiv.className = "error";
            messageDiv.innerText = "System error sending updates: " + error.toString();
            messageDiv.style.display = "block";
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Save Product Changes";
        }
    });
</script>

</body>
</html>
