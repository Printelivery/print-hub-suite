<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery - Advanced Bulk Admin Portal</title>
    <style>
        :root {
            --primary-color: #075E54;
            --bg-color: #f4f6f8;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 30px 15px;
            color: var(--text-dark);
        }
        .admin-container {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 1350px;
            margin: 0 auto;
        }
        h2 { color: var(--primary-color); margin: 0 0 20px 0; }
        
        /* Filter Section */
        .filter-panel {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }
        label { font-weight: 600; font-size: 0.85rem; color: #4a5568; }
        input[type="text"], select, input[type="password"] {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }
        
        /* Action Button Toolbar */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: #718096; color: white; }
        .btn-action { background-color: #2b6cb0; color: white; }
        .btn-success { background-color: #25D366; color: white; }
        .btn:disabled { background-color: #a0aec0; cursor: not-allowed; }

        /* Table Design */
        .table-wrapper { overflow-x: auto; margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: 700; }
        
        .locked-id { font-weight: 700; color: #4a5568; background: #e2e8f0; padding: 6px 10px; border-radius: 4px; display: inline-block; }
        .table-input { border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        textarea.table-input { height: 45px; resize: vertical; font-family: inherit; }
        
        .footer-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        #message { padding: 12px; border-radius: 6px; font-weight: 500; display: none; text-align: center; flex: 1; min-width: 250px; }
        .success { background-color: #def7ec; color: #03543f; border: 1px solid #bcf0da; }
        .error { background-color: #fde8e8; color: #9b1c1c; border: 1px solid #fbd5d5; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Product Management Bulk Portal</h2>
    
    <div class="filter-panel">
        <div class="filter-group">
            <label for="groupFilter">Product Group Filter</label>
            <select id="groupFilter">
                <option value="">All Groups</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="titleSearch">Product Name Search (Supports * wildcards)</label>
            <input type="text" id="titleSearch" placeholder="e.g., *photo copy* or exact string">
        </div>
        <button class="btn btn-primary" onclick="applyFilters()">Apply Filter</button>
        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-action" onclick="addNewRow()">+ New Product</button>
        <button class="btn btn-action" onclick="copySelectedRow()">📋 Copy (Duplicate as New)</button>
        <button class="btn btn-success" id="bulkUpdateBtn" onclick="submitBulkUpdates()">💾 Update Selected Rows</button>
    </div>

    <div class="table-wrapper">
        <table id="productTable">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="selectAllBox" onclick="toggleSelectAll(this)"></th>
                    <th style="width: 180px;">ProductGroup</th>
                    <th style="width: 140px;">ProductId</th>
                    <th style="width: 240px;">ProductName</th>
                    <th>Description</th>
                    <th style="width: 120px;">Price</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6" style="text-align:center; color:#718096; padding: 30px;">Loading live database stream...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-panel">
        <div class="filter-group" style="max-width: 300px;">
            <label for="password">Admin Security Password</label>
            <input type="password" id="password" placeholder="Enter script password" required>
        </div>
        <div id="message"></div>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZuJdNU_JDKhM9OSgx4yPa9rWGtL7PJ9dgbaoaWNJ4_0jZ-AUOKLEUiCCACjiHlOYwsvwNG1ftwCMG/pub?output=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwF_jQZZjqgoa9z0gGQmuhDJkw9DoMB1SLw_HmKQ4hAbj3DikFG6BMZkfdcric7H8zs/exec";

    let dataset = [];
    let uniqueGroups = new Set();
    let highestNumericId = 0;

    function parseCSV(text) {
        let p = '', r = []; let q = false; let row = [''];
        for (let i=0; i<text.length; i++) {
            let c = text[i]; let next = text[i+1];
            if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
            else if (c === ',' && !q) { row.push(''); }
            else if ((c === '\r' || c === '\n') && !q) {
                if (c === '\r' && next === '\n') { i++; }
                r.push(row); row = [''];
            } else { row[row.length-1] += c; }
        }
        if (row.length > 1 || row[0] !== '') { r.push(row); }
        return r;
    }

    async function initPortal() {
        try {
            const response = await fetch(CSV_URL);
            const dataText = await response.text();
            const parsedRows = parseCSV(dataText);
            parsedRows.shift();

            highestNumericId = 0;
            dataset = parsedRows.map(row => {
                const idName = row[1]?.trim() || "";
                
                if (idName && idName.includes('_')) {
                    const extractedNum = parseInt(idName.split('_')[1]);
                    if (!isNaN(extractedNum) && extractedNum > highestNumericId) {
                        highestNumericId = extractedNum;
                    }
                }

                return {
                    group: row[0]?.trim() || "",
                    id: idName,
                    name: row[2]?.trim() || "",
                    desc: row[3]?.trim() || "",
                    price: row[4]?.trim() || ""
                };
            }).filter(p => p.id !== "");

            uniqueGroups.clear();
            dataset.forEach(item => { if(item.group) uniqueGroups.add(item.group); });

            populateGroupDropdown();
            renderTable(dataset);
        } catch (error) {
            console.error("Core synchronization issue:", error);
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" style="text-align:center; color:#9b1c1c;">Error streaming dynamic dataset rows.</td></tr>`;
        }
    }

    function populateGroupDropdown() {
        const select = document.getElementById('groupFilter');
        select.innerHTML = '<option value="">All Groups</option>';
        uniqueGroups.forEach(g => {
            select.innerHTML += `<option value="${g}">${g}</option>`;
        });
    }

    function matchSearchTerm(title, term) {
        if (!term) return true;
        let cleanTitle = title.toLowerCase();
        let cleanTerm = term.toLowerCase();

        if (cleanTerm.startsWith('*') && cleanTerm.endsWith('*')) {
            return cleanTitle.includes(cleanTerm.slice(1, -1));
        } else if (cleanTerm.startsWith('*')) {
            return cleanTitle.endsWith(cleanTerm.slice(1));
        } else if (cleanTerm.endsWith('*')) {
            return cleanTitle.startsWith(cleanTerm.slice(0, -1));
        }
        return cleanTitle === cleanTerm;
    }

    function applyFilters() {
        const groupTarget = document.getElementById('groupFilter').value;
        const searchTarget = document.getElementById('titleSearch').value.trim();

        let filtered = dataset.filter(item => {
            let matchesGroup = !groupTarget || item.group.toLowerCase() === groupTarget.toLowerCase();
            let matchesTitle = matchSearchTerm(item.name, searchTarget);
            return matchesGroup && matchesTitle;
        });

        renderTable(filtered);
    }

    function clearFilters() {
        document.getElementById('groupFilter').value = "";
        document.getElementById('titleSearch').value = "";
        document.getElementById('selectAllBox').checked = false;
        renderTable(dataset);
    }

    function renderTable(dataArray) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if(dataArray.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:#718096;">No records matched.</td></tr>`;
            return;
        }

        dataArray.forEach(item => {
            appendRowMarkup(item.group, item.id, item.name, item.desc, item.price, false);
        });
    }

    function appendRowMarkup(group, id, name, desc, price, isChecked = false) {
        const tbody = document.getElementById('tableBody');
        const rowHTML = `
            <tr class="product-row" data-id="${id}">
                <td><input type="checkbox" class="row-checkbox" ${isChecked ? 'checked' : ''} onclick="handleRowCheckbox()"></td>
                <td><input type="text" class="table-input col-group" value="${group}" placeholder="Group name"></td>
                <td><span class="locked-id">${id}</span></td>
                <td><input type="text" class="table-input col-name" value="${name}" placeholder="Product title"></td>
                <td><textarea class="table-input col-desc" placeholder="Specifications...">${desc}</textarea></td>
                <td><input type="text" class="table-input col-price" value="${price}" placeholder="e.g., ₹5"></td>
            </tr>
        `;
        
        if(isChecked) {
            tbody.insertAdjacentHTML('afterbegin', rowHTML);
        } else {
            tbody.innerHTML += rowHTML;
        }
    }

    function addNewRow() {
        highestNumericId++;
        const generatedId = `PRNTLRY_${highestNumericId.toString().padStart(2, '0')}`;
        appendRowMarkup('', generatedId, '', '', '', true);
        handleRowCheckbox();
    }

    function copySelectedRow() {
        const checkedRows = document.querySelectorAll('.row-checkbox:checked');
        if (checkedRows.length !== 1) {
            alert("Please select exactly one existing row to copy/duplicate.");
            return;
        }

        const sourceRow = checkedRows[0].closest('.product-row');
        const groupVal = sourceRow.querySelector('.col-group').value;
        const nameVal = sourceRow.querySelector('.col-name').value;
        const descVal = sourceRow.querySelector('.col-desc').value;
        const priceVal = sourceRow.querySelector('.col-price').value;

        checkedRows[0].checked = false;

        highestNumericId++;
        const generatedId = `PRNTLRY_${highestNumericId.toString().padStart(2, '0')}`;

        appendRowMarkup(groupVal, generatedId, nameVal + " (Copy)", descVal, priceVal, true);
        handleRowCheckbox();
    }

    function toggleSelectAll(masterBox) {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(box => box.checked = masterBox.checked);
    }

    function handleRowCheckbox() {
        const allBoxes = document.querySelectorAll('.row-checkbox');
        const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');
        const selectAllBox = document.getElementById('selectAllBox');
        if (allBoxes.length > 0) {
            selectAllBox.checked = (allBoxes.length === checkedBoxes.length);
        } else {
            selectAllBox.checked = false;
        }
    }

    async function submitBulkUpdates() {
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');
        const btn = document.getElementById('bulkUpdateBtn');

        if(!password) {
            alert("Security management verification password is required.");
            return;
        }

        const selectedRows = [];
        document.querySelectorAll('.product-row').forEach(row => {
            if(row.querySelector('.row-checkbox').checked) {
                selectedRows.push({
                    productId: row.getAttribute('data-id'),
                    productGroup: row.querySelector('.col-group').value.trim(),
                    productName: row.querySelector('.col-name').value.trim(),
                    description: row.querySelector('.col-desc').value.trim(),
                    price: row.querySelector('.col-price').value.trim(),
                    password: password
                });
            }
        });

        if(selectedRows.length === 0) {
            alert("No spreadsheet data targets selected. Check items before hitting update.");
            return;
        }

        btn.disabled = true;
        msgDiv.className = "";
        msgDiv.style.display = "block";

        let successCount = 0;
        let errorsOccurred = false;

        for(let i = 0; i < selectedRows.length; i++) {
            msgDiv.innerText = `Syncing batch records to script database pipeline: (${i + 1}/${selectedRows.length})...`;
            try {
                // 🛟 FIX: Removed mode: 'no-cors' to let headers and response streams function naturally
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(selectedRows[i])
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    successCount++;
                } else {
                    console.error("Script returned error:", result.message);
                    errorsOccurred = true;
                }
            } catch (err) {
                console.error("Row connection failure index:", err);
                errorsOccurred = true;
            }
        }

        if (errorsOccurred && successCount === 0) {
            msgDiv.className = "error";
            msgDiv.innerText = "Failed to update records. Check password or script permissions.";
        } else {
            msgDiv.className = "success";
            msgDiv.innerText = `Successfully synced database records for ${successCount} entries! Refreshing views...`;
        }
        
        document.getElementById('selectAllBox').checked = false;
        await initPortal();
        
        btn.disabled = false;
        setTimeout(() => { msgDiv.style.display = "none"; }, 5000);
    }

    initPortal();
</script>

</body>
</html>
