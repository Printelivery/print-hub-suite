<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery - Advanced Bulk Admin Portal</title>
    <style>
        :root {
            --primary-color: #075E54;
            --bg-color: #f4f6f8;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 30px 15px;
            color: var(--text-dark);
        }
        .admin-container {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 1350px;
            margin: 0 auto;
        }
        h2 { color: var(--primary-color); margin: 0 0 20px 0; }
        
        /* Filter Section */
        .filter-panel {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            background: #edf2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 200px;
        }
        label { font-weight: 600; font-size: 0.85rem; color: #4a5568; }
        input[type="text"], select, input[type="password"] {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95rem;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }
        
        /* Action Button Toolbar */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: #718096; color: white; }
        .btn-action { background-color: #2b6cb0; color: white; }
        .btn-success { background-color: #25D366; color: white; }
        .btn:disabled { background-color: #a0aec0; cursor: not-allowed; }

        /* Table Design */
        .table-wrapper { overflow-x: auto; margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: #fff; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: 700; }
        
        .locked-id { font-weight: 700; color: #4a5568; background: #e2e8f0; padding: 6px 10px; border-radius: 4px; display: inline-block; }
        .table-input { border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        textarea.table-input { height: 45px; resize: vertical; font-family: inherit; }
        
        .footer-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        #message { padding: 12px; border-radius: 6px; font-weight: 500; display: none; text-align: center; flex: 1; min-width: 250px; }
        .success { background-color: #def7ec; color: #03543f; border: 1px solid #bcf0da; }
        .error { background-color: #fde8e8; color: #9b1c1c; border: 1px solid #fbd5d5; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Product Management Bulk Portal</h2>
    
    <div class="filter-panel">
        <div class="filter-group">
            <label for="groupFilter">Product Group Filter</label>
            <select id="groupFilter">
                <option value="">All Groups</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="titleSearch">Product Name Search (Supports * wildcards)</label>
            <input type="text" id="titleSearch" placeholder="e.g., *photo copy* or exact string">
        </div>
        <button class="btn btn-primary" onclick="applyFilters()">Apply Filter</button>
        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-action" onclick="addNewRow()">+ New Product</button>
        <button class="btn btn-action" onclick="copySelectedRow()">📋 Copy (Duplicate as New)</button>
        <button class="btn btn-success" id="bulkUpdateBtn" onclick="submitBulkUpdates()">💾 Update Selected Rows</button>
    </div>

    <div class="table-wrapper">
        <table id="productTable">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="selectAllBox" onclick="toggleSelectAll(this)"></th>
                    <th style="width: 180px;">ProductGroup</th>
                    <th style="width: 140px;">ProductId</th>
                    <th style="width: 240px;">ProductName</th>
                    <th>Description</th>
                    <th style="width: 120px;">Price</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6" style="text-align:center; color:#718096; padding: 30px;">Loading live database stream...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-panel">
        <div class="filter-group" style="max-width: 300px;">
            <label for="password">Admin Security Password</label>
            <input type="password" id="password" placeholder="Enter script password" required>
        </div>
        <div id="message"></div>
    </div>
</div>
