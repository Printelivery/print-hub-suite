<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalogue - Printelivery</title>
    <style>
        :root {
            --primary-color: #075E54;
            --accent-color: #25D366;
            --bg-color: #f8f9fa;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            color: #718096;
            font-size: 1.1rem;
            margin: 0;
        }
        
        /* Top Control Bar */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            flex-wrap: wrap;
            gap: 15px;
        }
        .column-selector-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .column-select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e0;
            font-size: 0.95rem;
            background: #fff;
            cursor: pointer;
        }
        .cart-toggle-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        .cart-badge {
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
        }

        /* Dynamic Catalog Grid Layouts */
        .catalog-grid {
            display: grid;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        .cols-1 { grid-template-columns: repeat(1, 1fr); }
        .cols-2 { grid-template-columns: repeat(2, 1fr); }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }
        .cols-5 { grid-template-columns: repeat(5, 1fr); }

        @media (max-width: 1024px) { .catalog-grid { grid-template-columns: repeat(2, 1fr) !important; } }
        @media (max-width: 650px) { .catalog-grid { grid-template-columns: repeat(1, 1fr) !important; } }

        .product-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        .image-container {
            width: 100%;
            height: 260px;
            background-color: #edf2f7;
            position: relative;
            overflow: hidden;
            cursor: zoom-in;
        }
        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out;
        }
        .product-image {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: none;
            z-index: 10;
        }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        .product-details {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-group-tag {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
        .product-id {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #1a202c;
            line-height: 1.4;
        }
        .product-desc {
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.5;
            margin: 0 0 20px 0;
            flex-grow: 1;
            white-space: pre-line;
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }
        .price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-color);
        }
        .order-button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .order-button:hover { background-color: #20ba59; }
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: #718096;
            padding: 40px;
        }

        /* Overlay Modals Frame */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-body {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #a0aec0;
        }
        .close-modal:hover { color: #2d3748; }

        /* Media View Modal Frame */
        #mediaViewModal .modal-body {
            background: transparent;
            box-shadow: none;
            padding: 0;
            max-width: 85vw;
            display: flex;
            justify-content: center;
        }
        #mediaViewModal img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            object-fit: contain;
        }

        /* Cart & Checkout Elements */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .cart-item-meta h4 { margin: 0 0 4px 0; color: #1a202c; }
        .cart-item-meta p { margin: 0; color: #718096; font-size: 0.9rem; }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            background: #edf2f7;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .qty-btn:hover { background: #e2e8f0; }
        .cart-summary { margin-top: 20px; border-top: 2px solid #edf2f7; padding-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .summary-row.total { font-size: 1.2rem; font-weight: 800; color: var(--primary-color); border-top: 1px dashed #cbd5e0; padding-top: 8px; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-weight: 600; font-size: 0.85rem; color: #4a5568; }
        .form-group input, .form-group textarea {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .checkout-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .checkout-btn:hover { background-color: #20ba59; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Our Product Catalogue</h1>
        <p>Premium Printing Tools, Custom Designs & Prints</p>
    </div>

    <div class="controls-bar">
        <div class="column-selector-group">
            <label for="colSelect">Items per row:</label>
            <select id="colSelect" class="column-select" onchange="alterGridLayout(this.value)">
                <option value="1">1 Product</option>
                <option value="2">2 Products</option>
                <option value="3" selected>3 Products</option>
                <option value="4">4 Products</option>
                <option value="5">5 Products</option>
            </select>
        </div>
        <button class="cart-toggle-btn" onclick="openCartViewModal()">
            🛒 View Cart <span id="cartCountBadge" class="cart-badge">0</span>
        </button>
    </div>

    <div class="catalog-grid cols-3" id="catalog">
        <div class="loading">Loading products live...</div>
    </div>

    <div id="mediaViewModal" class="modal-overlay" onclick="closeMediaViewModal()">
        <div class="modal-body">
            <img id="expandedMediaFrame" src="" alt="Expanded View">
        </div>
    </div>

    <div id="cartDrawerModal" class="modal-overlay">
        <div class="modal-body">
            <span class="close-modal" onclick="closeCartViewModal()">&times;</span>
            <h3>Your Shopping Cart</h3>
            <div id="cartItemsContainer">
                </div>
            <div id="cartSummaryBlock" class="cart-summary">
                </div>
            <button id="proceedCheckoutActionBtn" class="checkout-btn" onclick="openAddressCollectionModal()">Proceed to Delivery Details</button>
        </div>
    </div>

    <div id="addressCaptureModal" class="modal-overlay">
        <div class="modal-body">
            <span class="close-modal" onclick="closeAddressCollectionModal()">&times;</span>
            <h3>Delivery Details</h3>
            <form id="shippingAddressForm" onsubmit="compileFinalInvoiceAndSend(event)">
                <div class="form-group">
                    <label for="custName">Full Name</label>
                    <input type="text" id="custName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="custFlat">Flat No. / Building / Company</label>
                    <input type="text" id="custFlat" required placeholder="e.g., Block 2A, Flat 402">
                </div>
                <div class="form-group">
                    <label for="custAddress">Street Address / Area</label>
                    <textarea id="custAddress" rows="3" required placeholder="Enter your full street details"></textarea>
                </div>
                <div class="form-group">
                    <label for="custPin">Pin Code</label>
                    <input type="text" id="custPin" required placeholder="600130">
                </div>
                <div class="form-group">
                    <label for="custPhone">Phone Number</label>
                    <input type="tel" id="custPhone" required placeholder="9876543210">
                </div>
                <button type="submit" class="checkout-btn">Confirm Order & Send to WhatsApp</button>
            </form>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZuJdNU_JDKhM9OSgx4yPa9rWGtL7PJ9dgbaoaWNJ4_0jZ-AUOKLEUiCCACjiHlOYwsvwNG1ftwCMG/pub?output=csv";
        
        let localProductsRegistry = [];
        let shoppingCartState = {};

        function parseCSV(text) {
            let p = '', r = []; let q = false; let row = [''];
            for (let i=0; i<text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) {
                    if (c === '\r' && next === '\n') { i++; }
                    r.push(row); row = [''];
                } else { row[row.length-1] += c; }
            }
            if (row.length > 1 || row[0] !== '') { r.push(row); }
            return r;
        }

        async function fetchProducts() {
            try {
                const response = await fetch(CSV_URL + "&cachebuster=" + new Date().getTime());
                const dataText = await response.text();
                const parsedRows = parseCSV(dataText);
                parsedRows.shift();
                
                localProductsRegistry = parsedRows.map(row => ({
                    group: row[0]?.trim() || "",
                    id: row[1]?.trim() || "",
                    name: row[2]?.trim() || "",
                    desc: row[3]?.trim() || "",
                    price: row[4]?.trim() || ""
                })).filter(p => p.id !== "");

                renderCatalog(localProductsRegistry);
            } catch (error) {
                console.error("Error connecting to data layer:", error);
                document.getElementById('catalog').innerHTML = `<div class="loading" style="color: #9b1c1c;">Failed to load data stream dynamically.</div>`;
            }
        }

        function alterGridLayout(columnsNumber) {
            const catalog = document.getElementById('catalog');
            catalog.className = `catalog-grid cols-${columnsNumber}`;
        }

        function renderCatalog(productsList) {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = '';

            if (productsList.length === 0) {
                catalogContainer.innerHTML = '<div class="loading">No products discovered in your data sheets.</div>';
                return;
            }

            productsList.forEach((prod, index) => {
                const cardId = `card-${index}`;
                const cardHTML = `
                    <div class="product-card">
                        <div class="image-container" id="${cardId}" onclick="handleImageContainerClick(event, '${cardId}')">
                            <button class="slider-btn prev" onclick="moveSlide('${cardId}', -1); event.stopPropagation();">&#10094;</button>
                            <div class="slider-wrapper">
                                <img class="product-image" src="../images/${prod.id}.jpg" onerror="this.src='https://placehold.co/600x400/075E54/white?text=${encodeURIComponent(prod.id)}'">
                            </div>
                            <button class="slider-btn next" onclick="moveSlide('${cardId}', 1); event.stopPropagation();">&#10095;</button>
                        </div>
                        <div class="product-details">
                            <div class="product-group-tag">${prod.group}</div>
                            <div class="product-id">ID: ${prod.id}</div>
                            <h3 class="product-title">${prod.name}</h3>
                            <p class="product-desc">${prod.desc}</p>
                            <div class="action-row">
                                <span class="price">${prod.price}</span>
                                <button class="order-button" onclick="addItemToCart('${prod.id}')">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
                catalogContainer.innerHTML += cardHTML;
                checkMultiImages(prod.id, cardId);
            });
        }

        function checkMultiImages(productId, cardId) {
            setTimeout(() => {
                const card = document.getElementById(cardId);
                if (!card) return;
                const container = card.querySelector('.slider-wrapper');
                
                const multiCheck = new Image();
                multiCheck.src = `../images/1_${productId}.jpg`;
                
                multiCheck.onload = function() {
                    container.innerHTML = '';
                    for (let i = 1; i <= 4; i++) {
                        const extraImg = document.createElement('img');
                        extraImg.className = 'product-image';
                        extraImg.src = `../images/${i}_${productId}.jpg`;
                        
                        extraImg.onerror = function() { 
                            this.remove(); 
                            updateSliderControls(card); 
                        };
                        extraImg.onload = function() { 
                            updateSliderControls(card); 
                        };
                        container.appendChild(extraImg);
                    }
                };
            }, 50);
        }

        function updateSliderControls(container) {
            if (!container) return;
            const imgs = container.querySelectorAll('.product-image');
            const prevBtn = container.querySelector('.slider-btn.prev');
            const nextBtn = container.querySelector('.slider-btn.next');
            if (imgs.length > 1) {
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'block';
            } else {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }
        }

        function moveSlide(containerId, direction) {
            const container = document.getElementById(containerId);
            const wrapper = container.querySelector('.slider-wrapper');
            const imgs = wrapper.querySelectorAll('.product-image');
            
            let currentSlide = parseInt(container.getAttribute('data-current-slide') || "0");
            currentSlide += direction;
            
            if (currentSlide >= imgs.length) currentSlide = 0;
            if (currentSlide < 0) currentSlide = imgs.length - 1;
            
            container.setAttribute('data-current-slide', currentSlide);
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // Expanded Image Modals Logic
        function handleImageContainerClick(event, cardId) {
            const container = document.getElementById(cardId);
            const wrapper = container.querySelector('.slider-wrapper');
            const imgs = wrapper.querySelectorAll('.product-image');
            
            if(imgs.length === 0) return;
            
            let currentSlide = parseInt(container.getAttribute('data-current-slide') || "0");
            if(currentSlide >= imgs.length) currentSlide = 0;
            
            const targetSrc = imgs[currentSlide].src;
            document.getElementById('expandedMediaFrame').src = targetSrc;
            document.getElementById('mediaViewModal').style.display = 'flex';
        }

        function closeMediaViewModal() {
            document.getElementById('mediaViewModal').style.display = 'none';
        }

        // Cart Actions Engine
        function addItemToCart(productId) {
            const targetProduct = localProductsRegistry.find(p => p.id === productId);
            if (!targetProduct) return;

            if (shoppingCartState[productId]) {
                shoppingCartState[productId].qty += 1;
            } else {
                shoppingCartState[productId] = {
                    metadata: targetProduct,
                    qty: 1
                };
            }
            synchronizeCartBadgeUI();
        }

        function alterItemQuantity(productId, modificationDelta) {
            if (!shoppingCartState[productId]) return;
            
            shoppingCartState[productId].qty += modificationDelta;
            if (shoppingCartState[productId].qty <= 0) {
                delete shoppingCartState[productId];
            }
            
            synchronizeCartBadgeUI();
            rebuildCartContentsMarkup();
        }

        function clearItemFromCart(productId) {
            delete shoppingCartState[productId];
            synchronizeCartBadgeUI();
            rebuildCartContentsMarkup();
        }

        function synchronizeCartBadgeUI() {
            let aggregateUnits = 0;
            for (let item in shoppingCartState) {
                aggregateUnits += shoppingCartState[item].qty;
            }
            document.getElementById('cartCountBadge').innerText = aggregateUnits;
        }

        function cleanNumericPricing(priceString) {
            return parseFloat(priceString.replace(/[^0-9.]/g, '')) || 0;
        }

        function openCartViewModal() {
            rebuildCartContentsMarkup();
            document.getElementById('cartDrawerModal').style.display = 'flex';
        }

        function closeCartViewModal() {
            document.getElementById('cartDrawerModal').style.display = 'none';
        }

        function rebuildCartContentsMarkup() {
            const container = document.getElementById('cartItemsContainer');
            const summaryBox = document.getElementById('cartSummaryBlock');
            const proceedBtn = document.getElementById('proceedCheckoutActionBtn');
            
            container.innerHTML = '';
            
            let aggregateOrderValue = 0;
            let totalItemsKeys = Object.keys(shoppingCartState);

            if (totalItemsKeys.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 20px; color:#718096;">Your cart feels empty!</p>';
                summaryBox.innerHTML = '';
                proceedBtn.style.display = 'none';
                return;
            }

            proceedBtn.style.display = 'block';

            totalItemsKeys.forEach(key => {
                const item = shoppingCartState[key];
                const cleanUnitValue = cleanNumericPricing(item.metadata.price);
                const combinedRowCost = cleanUnitValue * item.qty;
                aggregateOrderValue += combinedRowCost;

                container.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-meta">
                            <h4>${item.metadata.name}</h4>
                            <p>${item.metadata.price} × ${item.qty}</p>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="alterItemQuantity('${key}', -1)">-</button>
                            <span style="font-weight:600; width:20px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="alterItemQuantity('${key}', 1)">+</button>
                            <button class="qty-btn" style="background:#fff; color:#e53e3e; margin-left:8px;" onclick="clearItemFromCart('${key}')">✕</button>
                        </div>
                    </div>
                `;
            });

            // live GST backward valuation extract layout logic
            const inclusiveTaxRate = 0.18; 
            const baseTaxableAmount = aggregateOrderValue / (1 + inclusiveTaxRate);
            const calculatedGstSlice = aggregateOrderValue - baseTaxableAmount;

            summaryBox.innerHTML = `
                <div class="summary-row"><span>Taxable Net Amount:</span><span>₹${baseTaxableAmount.toFixed(2)}</span></div>
                <div class="summary-row"><span>CGST + SGST Split (18%):</span><span>₹${calculatedGstSlice.toFixed(2)}</span></div>
                <div class="summary-row total"><span>Total Payable Value (Inc. GST):</span><span>₹${aggregateOrderValue.toFixed(2)}</span></div>
            `;
        }

        function openAddressCollectionModal() {
            closeCartViewModal();
            document.getElementById('addressCaptureModal').style.display = 'flex';
        }

        function closeAddressCollectionModal() {
            document.getElementById('addressCaptureModal').style.display = 'none';
        }

        // Output Generation & Whatsapp Transfer Handler
        function compileFinalInvoiceAndSend(event) {
            event.preventDefault();

            const targetName = document.getElementById('custName').value.trim();
            const targetFlat = document.getElementById('custFlat').value.trim();
            const targetStreet = document.getElementById('custAddress').value.trim();
            const targetPin = document.getElementById('custPin').value.trim();
            const targetPhone = document.getElementById('custPhone').value.trim();

            let txtMessage = `📦 *NEW INBOUND ORDER - PRINTELIVERY*\n\n`;
            txtMessage += `👤 *Customer Details:*\n`;
            txtMessage += `Name: ${targetName}\n`;
            txtMessage += `Phone: ${targetPhone}\n`;
            txtMessage += `Address: ${targetFlat}, ${targetStreet}, PIN: ${targetPin}\n\n`;
            txtMessage += `🛒 *Items Ordered:*\n`;

            let aggregateOrderValue = 0;

            Object.keys(shoppingCartState).forEach(key => {
                const item = shoppingCartState[key];
                const rate = cleanNumericPricing(item.metadata.price);
                const lineTotal = rate * item.qty;
                aggregateOrderValue += lineTotal;

                txtMessage += `▪️ ${item.metadata.name} [ID: ${item.metadata.id}]\n`;
                txtMessage += `   Qty: ${item.qty} @ ${item.metadata.price} = ₹${lineTotal.toFixed(2)}\n`;
            });

            const baseTaxableAmount = aggregateOrderValue / 1.18;
            const calculatedGstSlice = aggregateOrderValue - baseTaxableAmount;

            txtMessage += `\n🧾 *Tax Invoice Summary:*\n`;
            txtMessage += `Net Taxable Value: ₹${baseTaxableAmount.toFixed(2)}\n`;
            txtMessage += `Integrated GST Value (18%): ₹${calculatedGstSlice.toFixed(2)}\n`;
            txtMessage += `*Gross Payable Total: ₹${aggregateOrderValue.toFixed(2)}* (Inclusive of GST)\n`;

            const finalUrlTarget = `https://wa.me/918920755505?text=${encodeURIComponent(txtMessage)}`;
            
            // Wipe data states on submission exit paths
            shoppingCartState = {};
            synchronizeCartBadgeUI();
            closeAddressCollectionModal();
            document.getElementById('shippingAddressForm').reset();

            window.open(finalUrlTarget, '_blank');
        }

        fetchProducts();
    </script>
