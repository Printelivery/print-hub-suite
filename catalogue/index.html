<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalogue - Printelivery</title>
    <style>
        :root {
            --primary-color: #075E54;
            --accent-color: #25D366;
            --bg-color: #f8f9fa;
            --text-dark: #2d3748;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            color: #718096;
            font-size: 1.1rem;
            margin: 0;
        }
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .product-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }
        .image-container {
            width: 100%;
            height: 260px;
            background-color: #edf2f7;
            position: relative;
            overflow: hidden;
        }
        .slider-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out;
        }
        .product-image {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: none;
            z-index: 10;
        }
        .slider-btn.prev { left: 10px; }
        .slider-btn.next { right: 10px; }
        .product-details {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .product-group-tag {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
        .product-id {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #1a202c;
            line-height: 1.4;
        }
        .product-desc {
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.5;
            margin: 0 0 20px 0;
            flex-grow: 1;
            white-space: pre-line;
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }
        .price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-color);
        }
        .order-button {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s ease;
        }
        .order-button:hover {
            background-color: #20ba59;
        }
        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: #718096;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Our Product Catalogue</h1>
        <p>Premium Printing Tools, Custom Designs & Prints</p>
    </div>

    <div class="catalog-grid" id="catalog">
        <div class="loading">Loading products live...</div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZuJdNU_JDKhM9OSgx4yPa9rWGtL7PJ9dgbaoaWNJ4_0jZ-AUOKLEUiCCACjiHlOYwsvwNG1ftwCMG/pub?gid=0&single=true&output=csv";

        // Accurate parser ensuring fields containing commas wrapped in quotes are safely retained
        function parseCSV(text) {
            let p = '', r = [];
            let q = false;
            let row = [''];
            for (let i=0; i<text.length; i++) {
                let c = text[i];
                let next = text[i+1];
                if (c === '"') { if (q && next === '"') { row[row.length-1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) {
                    if (c === '\r' && next === '\n') { i++; }
                    r.push(row);
                    row = [''];
                } else { row[row.length-1] += c; }
            }
            if (row.length > 1 || row[0] !== '') { r.push(row); }
            return r;
        }

        async function fetchProducts() {
            try {
                const response = await fetch(CSV_URL);
                const dataText = await response.text();
                const parsedRows = parseCSV(dataText);
                
                // Drop database headers row safely
                parsedRows.shift();
                
                // Map out elements using your 5 custom columns layout
                const products = parsedRows.map(row => ({
                    group: row[0]?.trim() || "",
                    id: row[1]?.trim() || "",
                    name: row[2]?.trim() || "",
                    desc: row[3]?.trim() || "",
                    price: row[4]?.trim() || ""
                })).filter(p => p.id !== "");

                renderCatalog(products);
            } catch (error) {
                console.error("Error connecting to data layer:", error);
                document.getElementById('catalog').innerHTML = `<div class="loading" style="color: #9b1c1c;">Failed to load data stream dynamically.</div>`;
            }
        }

        function renderCatalog(productsList) {
            const catalogContainer = document.getElementById('catalog');
            catalogContainer.innerHTML = '';

            if (productsList.length === 0) {
                catalogContainer.innerHTML = '<div class="loading">No products discovered in your data sheets.</div>';
                return;
            }

            productsList.forEach((prod, index) => {
                const cardId = `card-${index}`;
                const cardHTML = `
                    <div class="product-card">
                        <div class="image-container" id="${cardId}">
                            <button class="slider-btn prev" onclick="moveSlide('${cardId}', -1)">&#10094;</button>
                            <div class="slider-wrapper">
                                <img class="product-image" src="../images/${prod.id}.jpg" onerror="this.src='https://placehold.co/600x400/075E54/white?text=${encodeURIComponent(prod.id)}'">
                            </div>
                            <button class="slider-btn next" onclick="moveSlide('${cardId}', 1)">&#10095;</button>
                        </div>
                        <div class="product-details">
                            <div class="product-group-tag">${prod.group}</div>
                            <div class="product-id">ID: ${prod.id}</div>
                            <h3 class="product-title">${prod.name}</h3>
                            <p class="product-desc">${prod.desc}</p>
                            <div class="action-row">
                                <span class="price">${prod.price}</span>
                                <a href="https://wa.me/918920755505?text=Hi, I am interested in ordering: ${encodeURIComponent(prod.name)} [ID: ${prod.id}] (${prod.price})" target="_blank" class="order-button">Order Now</a>
                            </div>
                        </div>
                    </div>
                `;
                catalogContainer.innerHTML += cardHTML;
                
                // Track multislide images using ProductId structure references
                checkMultiImages(prod.id, cardId);
            });
        }

        function checkMultiImages(productId, cardId) {
            setTimeout(() => {
                const card = document.getElementById(cardId);
                if (!card) return;
                const container = card.querySelector('.slider-wrapper');
                
                const multiCheck = new Image();
                multiCheck.src = `../images/1_${productId}.jpg`;
                
                multiCheck.onload = function() {
                    container.innerHTML = '';
                    for (let i = 1; i <= 4; i++) {
                        const extraImg = document.createElement('img');
                        extraImg.className = 'product-image';
                        extraImg.src = `../images/${i}_${productId}.jpg`;
                        
                        extraImg.onerror = function() { 
                            this.remove(); 
                            updateSliderControls(card); 
                        };
                        extraImg.onload = function() { 
                            updateSliderControls(card); 
                        };
                        container.appendChild(extraImg);
                    }
                };
            }, 50);
        }

        function updateSliderControls(container) {
            if (!container) return;
            const imgs = container.querySelectorAll('.product-image');
            const prevBtn = container.querySelector('.slider-btn.prev');
            const nextBtn = container.querySelector('.slider-btn.next');
            if (imgs.length > 1) {
                prevBtn.style.display = 'block';
                nextBtn.style.display = 'block';
            } else {
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }
        }

        function moveSlide(containerId, direction) {
            const container = document.getElementById(containerId);
            const wrapper = container.querySelector('.slider-wrapper');
            const imgs = wrapper.querySelectorAll('.product-image');
            
            let currentSlide = parseInt(container.getAttribute('data-current-slide') || "0");
            currentSlide += direction;
            
            if (currentSlide >= imgs.length) currentSlide = 0;
            if (currentSlide < 0) currentSlide = imgs.length - 1;
            
            container.setAttribute('data-current-slide', currentSlide);
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // Run data parsing routine live
        fetchProducts();
    </script>
</body>
</html>
