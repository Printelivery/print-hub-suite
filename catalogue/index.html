<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printelivery | Product Catalogue</title>
    <style>
        :root { --primary: #075E54; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        
        /* Navigation & Top Controls */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .cart-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Catalog Grid */
        .catalog-container { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .qty-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 15px; }
        
        /* Modal Infrastructure */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 40px; border-radius: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        /* Carousel Specifics (The 5% Padding Requirement) */
        .carousel-view { width: 100%; padding: 5%; box-sizing: border-box; text-align: center; }
        .carousel-img { width: 100%; border-radius: 10px; }
        .nav-arrow { position: absolute; top: 50%; background: rgba(0,0,0,0.5); color: white; border: none; padding: 20px; cursor: pointer; font-size: 24px; }
        .nav-arrow.prev { left: 20px; }
        .nav-arrow.next { right: 20px; }
        
        /* Checkout Form */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .action-btn { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <iframe id="orderHandlerFrame" src="OrderHandler.html" style="display:none;"></iframe>

    <nav class="top-nav">
        <h1>Printelivery</h1>
        <button class="cart-btn" onclick="openCartModal()">🛒 Cart (<span id="cartCount">0</span>)</button>
    </nav>

    <main class="catalog-container" id="catalog">
        </main>

    <div id="detailModal" class="modal" onclick="closeModal('detailModal')">
        <div class="modal-content" onclick="event.stopPropagation()" id="detailBody"></div>
    </div>

    <div id="cartModal" class="modal" onclick="closeModal('cartModal')">
        <div class="modal-content" onclick="event.stopPropagation()" id="cartBody"></div>
    </div>

    <div id="checkoutModal" class="modal" onclick="closeModal('checkoutModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Delivery Details</h3>
            <form onsubmit="submitOrder(event)">
                <div class="form-group"><label>Full Name</label><input type="text" id="custName" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="custPhone" required></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="custEmail" required></div>
                <div class="form-group"><label>Flat No./Building</label><input type="text" id="custFlat" required></div>
                <div class="form-group"><label>Street Address</label><textarea id="custAddress" rows="3" required></textarea></div>
                <div class="form-group"><label>Pin Code</label><input type="text" id="custPin" required></div>
                <button type="submit" class="action-btn">Confirm & Process</button>
            </form>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZuJdNU_JDKhM9OSgx4yPa9rWGtL7PJ9dgbaoaWNJ4_0jZ-AUOKLEUiCCACjiHlOYwsvwNG1ftwCMG/pub?output=csv";
        const IMG_BASE = "https://print-hub-suite.vercel.app/images/";
        
        let products = [];
        let cart = {};
        let currentImgIdx = 1;

        async function init() {
            const res = await fetch(CSV_URL);
            const raw = await res.text();
            products = raw.split('\n').slice(1).map(r => r.split(',')).filter(c => c[1]).map(c => ({
                id: c[1], name: c[2], desc: c[3], price: c[4]
            }));
            renderCatalog();
        }

        function renderCatalog() {
            const container = document.getElementById('catalog');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${IMG_BASE}${p.id}_1.jpg" class="product-img" onclick="openDetails('${p.id}')">
                    <h3>${p.name}</h3>
                    <p>Price: ₹${p.price}</p>
                    <div id="btn-wrap-${p.id}">
                        <button class="action-btn" onclick="addToCart('${p.id}')">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // --- QTY LOGIC ---
        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart[id] = { ...p, qty: 1 };
            updateProductUI(id);
            updateCartBadge();
        }

        function changeQty(id, delta) {
            if (cart[id]) {
                cart[id].qty += delta;
                if (cart[id].qty <= 0) {
                    delete cart[id];
                    resetProductUI(id);
                } else {
                    updateProductUI(id);
                }
            }
            updateCartBadge();
        }

        function updateProductUI(id) {
            document.getElementById(`btn-wrap-${id}`).innerHTML = `
                <div class="qty-controls">
                    <button class="action-btn" onclick="changeQty('${id}', -1)">-</button>
                    <span>${cart[id].qty}</span>
                    <button class="action-btn" onclick="changeQty('${id}', 1)">+</button>
                </div>
            `;
        }

        function resetProductUI(id) {
            document.getElementById(`btn-wrap-${id}`).innerHTML = `<button class="action-btn" onclick="addToCart('${id}')">Add to Cart</button>`;
        }

        // --- CAROUSEL LOGIC ---
        function openDetails(id) {
            const p = products.find(x => x.id === id);
            currentImgIdx = 1;
            document.getElementById('detailBody').innerHTML = `
                <div class="carousel-view">
                    <img id="mainImg" class="carousel-img" src="${IMG_BASE}${p.id}_1.jpg">
                    <button class="nav-arrow prev" onclick="moveSlide('${p.id}', -1)">❮</button>
                    <button class="nav-arrow next" onclick="moveSlide('${p.id}', 1)">❯</button>
                </div>
                <h2>${p.name}</h2>
                <p>${p.desc}</p>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function moveSlide(id, dir) {
            currentImgIdx = (currentImgIdx + dir < 1) ? 3 : (currentImgIdx + dir > 3 ? 1 : currentImgIdx + dir);
            document.getElementById('mainImg').src = `${IMG_BASE}${id}_${currentImgIdx}.jpg`;
        }

        // --- CART/CHECKOUT LOGIC ---
        function openCartModal() {
            document.getElementById('cartBody').innerHTML = `
                <h3>Your Cart</h3>
                ${Object.values(cart).map(i => `<p>${i.name} (x${i.qty}) - ₹${i.price * i.qty}</p>`).join('')}
                <button class="action-btn" onclick="closeModal('cartModal'); document.getElementById('checkoutModal').style.display='flex'">Proceed to Checkout</button>
            `;
            document.getElementById('cartModal').style.display = 'flex';
        }

        function submitOrder(e) {
            e.preventDefault();
            const customer = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                email: document.getElementById('custEmail').value,
                flat: document.getElementById('custFlat').value,
                address: document.getElementById('custAddress').value,
                pin: document.getElementById('custPin').value
            };
            
            // Bridge
            document.getElementById('orderHandlerFrame').contentWindow.postMessage({
                type: 'PROCESS_ORDER',
                cart: cart,
                customer: customer
            }, '*');
            
            alert("Order sent to processing...");
            closeModal('checkoutModal');
        }

        function updateCartBadge() { document.getElementById('cartCount').innerText = Object.values(cart).reduce((a, b) => a + b.qty, 0); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        init();
    </script>
</body>
</html>
